name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm/action-setup puts pnpm on PATH for the runner. We still call it
      # via `corepack pnpm` in scripts on the dev box; in CI either is fine,
      # so we use the bare `pnpm` shim here for readability and rely on
      # corepack inside the root scripts that delegate to workspaces.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # Wired-ahead env vars for tests:
      # - `DATABASE_URL_TEST` is empty until Task 7 (Neon) lands. Current 9 specs
      #   do not touch a DB; the slot is here so future DB-touching tests pick
      #   it up automatically.
      # - `MAGIC_LINK_SECRET` is forwarded so future token tests that drop their
      #   own `beforeAll` override fall back to a CI-provided value instead of
      #   failing. Today's token.test.ts overrides locally, so this is unused.
      - name: Test
        env:
          DATABASE_URL_TEST: ${{ secrets.DATABASE_URL_TEST }}
          MAGIC_LINK_SECRET: ${{ secrets.MAGIC_LINK_SECRET }}
        run: pnpm test

      # Build only the web app from CI. The root `pnpm build` is `pnpm -r build`
      # which would also invoke `tauri build` in apps/desktop — that is macOS-only
      # and handled by desktop-build.yml.
      #
      # Why no MAGIC_LINK_SECRET here? `next build` does not invoke the token
      # module, and the module reads its secret lazily at call-time. If a future
      # change introduces top-level secret access, the failure surfaces at
      # request time (production) — the right place to catch it is the test
      # step above, not here.
      - name: Build web
        run: pnpm --filter web build
