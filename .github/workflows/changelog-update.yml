name: Regenerate changelog

# Manual trigger only — Gili clicks "Run workflow" when he wants a
# fresh JSON. Keeps the automation low-risk (no auto-commits on push,
# no merge-conflict churn with ongoing PRs). Opens a PR with the diff
# so Gili reviews before merging.
#
# 2026-04-22 — audit Task 8 (overnight Task D).
#
# Security note: deliberately takes NO user inputs. Some upstream
# GitHub Actions warnings flag `inputs.*` usage when piped into
# run-commands — this workflow has nothing to pipe and uses only
# trusted action + YAML data paths, so the surface stays minimal.

on:
  workflow_dispatch:

jobs:
  regen:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `git log -500` sees enough commits.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Regenerate changelog JSON
        run: pnpm -F web changelog:regen

      - name: Open PR with the diff
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(changelog): regenerate from recent commits"
          title: "chore(changelog): regenerate from recent commits"
          body: |
            Auto-regenerated the changelog JSON from the last 500
            commits on `main`. Review the diff + merge when you're
            happy with how it reads on the public `/changelog` page.

            Generated by `.github/workflows/changelog-update.yml` via
            manual `workflow_dispatch` trigger.
          branch: chore/changelog-regen
          delete-branch: true
          add-paths: |
            apps/web/src/app/(public)/changelog/entries.generated.json
