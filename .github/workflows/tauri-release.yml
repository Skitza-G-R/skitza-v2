name: Tauri Release

# Fires on version tags (vX.Y.Z) and builds Skitza desktop bundles for
# macOS (.dmg) and Windows (.msi), attaching them to the corresponding
# GitHub Release. This is the distribution pipeline: users download
# installers straight from the Releases page on the repo.
#
# UNSIGNED — the macOS .dmg will trigger Gatekeeper warnings and the
# Windows .msi will trigger SmartScreen warnings until an Apple
# Developer cert and an Authenticode cert are wired in via secrets.
# Code-signing is out of scope for Phase F; see follow-up task.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
          cache-on-failure: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Note unsigned bundle
        shell: bash
        run: echo "::warning::This bundle is unsigned. Users will see Gatekeeper / SmartScreen warnings until code-signing is wired."

      - name: Build Tauri bundle
        run: pnpm --filter desktop build

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
