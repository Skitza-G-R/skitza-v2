          <StatTile label="Status" value={<span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}><StatusPill tagType={p.tagType} label={p.tag} /></span>} />
          <StatTile label="Progress" value={`${p.progress}%`} mono trend={<div style={{ height: 4, borderRadius: 2, background: 'rgb(var(--border-subtle))', marginTop: 6 }}><div style={{ width: `${p.progress}%`, height: '100%', background: 'rgb(var(--fg-default))', borderRadius: 2 }} /></div>} />
          <StatTile label="Deadline" value={overdue ? `${Math.abs(p.deadlineDays)}d late` : p.deadline} mono accent={overdue ? 'danger' : (p.deadlineDays < 7 ? 'warning' : null)} />
          <StatTile label="Outstanding" value={balance > 0 ? fmtMoney(balance) : 'Settled'} mono accent={balance > 0 ? 'danger' : 'success'} />
        </div>

        {/* Tabs */}
        <nav className="reveal-up stagger-2" style={{ display: 'flex', gap: 4, marginBottom: 14, padding: 4, borderRadius: 10, background: 'rgb(var(--bg-elevated))', border: '1px solid rgb(var(--border-subtle))', overflowX: 'auto' }}>
          {tabs.map(t => (
            <button key={t.key} onClick={() => setTab(t.key)} style={{ all: 'unset', cursor: 'pointer', padding: '8px 14px', borderRadius: 7, fontSize: 12, fontWeight: 700, background: tab === t.key ? 'rgb(var(--bg-default))' : 'transparent', color: tab === t.key ? 'rgb(var(--fg-default))' : 'rgb(var(--fg-muted))', display: 'inline-flex', alignItems: 'center', gap: 6, whiteSpace: 'nowrap' }}>
              <Icon name={t.icon} size={12} />{t.label}
            </button>
          ))}
        </nav>

        <div className="reveal-up stagger-3">
          {tab === 'overview' && <OverviewTab project={p} tracks={projTracks} onPlay={onPlay} onOpenSong={onOpenSong} setTab={setTab} />}
          {tab === 'songs'    && <SongsTab tracks={projTracks} onPlay={onPlay} onOpenSong={onOpenSong} currentTrackId={currentTrackId} isPlaying={isPlaying} hoverTrack={hoverTrack} setHoverTrack={setHoverTrack} />}
          {tab === 'files'    && <FilesTab project={p} />}
          {tab === 'payments' && <PaymentsTab project={p} />}
          {tab === 'activity' && <ActivityTab project={p} tracks={projTracks} />}
        </div>
      </div>
    </div>
  );
}

function StatTile({ label, value, mono, accent, trend }) {
  const accents = {
    danger:  { color: 'rgb(var(--fg-danger))', bg: 'rgb(var(--fg-danger) / 0.06)', border: 'rgb(var(--fg-danger) / 0.2)' },
    warning: { color: 'rgb(var(--fg-warning))', bg: 'rgb(var(--fg-warning) / 0.06)', border: 'rgb(var(--fg-warning) / 0.2)' },
    success: { color: 'rgb(var(--fg-success))', bg: 'rgb(var(--fg-success) / 0.06)', border: 'rgb(var(--fg-success) / 0.2)' },
  };
  const a = accent ? accents[accent] : null;
  return (
    <div style={{ padding: '12px 14px', borderRadius: 12, background: a ? a.bg : 'rgb(var(--bg-elevated))', border: '1px solid ' + (a ? a.border : 'rgb(var(--border-subtle))') }}>
      <div className="label-tiny" style={{ marginBottom: 6 }}>{label}</div>
      <div style={{ fontSize: 17, fontWeight: 800, letterSpacing: '-0.015em', fontFamily: mono ? 'JetBrains Mono' : 'inherit', color: a ? a.color : 'rgb(var(--fg-default))' }} className={mono ? 'tabular' : ''}>{value}</div>
      {trend}
    </div>
  );
}

/* ----- Overview tab ----- */
function OverviewTab({ project, tracks, onPlay, onOpenSong, setTab }) {
  const stages = ['Brief & Intake', 'Production', 'Mixing', 'Review', 'Mastering', 'Delivery'];
  const stageIdx = Math.min(stages.length - 1, Math.floor((project.progress / 100) * stages.length));
  return (
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: 12 }}>
      <Card title="Workflow" icon={<Icon name="check-circle" size={14} />} action={<button onClick={() => setTab('activity')} className="sk-pop" style={{ all: 'unset', cursor: 'pointer', fontSize: 10.5, fontWeight: 700, color: 'rgb(var(--fg-muted))', textTransform: 'uppercase', letterSpacing: '0.08em' }}>History</button>}>
        <div style={{ padding: 8, display: 'flex', flexDirection: 'column', gap: 2 }}>
          {stages.map((stage, i) => {
            const done = i < stageIdx;
            const active = i === stageIdx;
            return (
              <div key={stage} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '8px 10px', borderRadius: 8, background: active ? 'rgb(var(--brand-primary) / 0.08)' : 'transparent' }}>
                <span style={{ width: 22, height: 22, borderRadius: 11, background: done ? 'rgb(var(--fg-success))' : (active ? 'rgb(var(--brand-primary))' : 'rgb(var(--border-subtle))'), color: (done || active) ? '#fff' : 'rgb(var(--fg-muted))', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, fontWeight: 800, flexShrink: 0 }}>
                  {done ? <Icon name="check" size={11} strokeWidth={3} /> : i + 1}
                </span>
                <span style={{ flex: 1, fontSize: 12.5, fontWeight: active ? 700 : 500, color: (done || active) ? 'rgb(var(--fg-default))' : 'rgb(var(--fg-muted))' }}>{stage}</span>
                {active && <span className="pill pill-brand" style={{ fontSize: 9 }}>NOW</span>}
              </div>
            );
          })}
        </div>
      </Card>

      <Card title="Latest songs" icon={<Icon name="music" size={14} />} action={<button onClick={() => setTab('songs')} className="sk-pop" style={{ all: 'unset', cursor: 'pointer', fontSize: 10.5, fontWeight: 700, color: 'rgb(var(--fg-muted))', textTransform: 'uppercase', letterSpacing: '0.08em' }}>See all</button>}>
        <div style={{ padding: 4 }}>
          {tracks.slice(0, 3).map((t) => (
            <div key={t.id} className="sk-row" onClick={() => onOpenSong(t.id)} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 10px', borderRadius: 8, cursor: 'pointer' }}>
              <PlayCircle size={30} onClick={(e) => { e?.stopPropagation?.(); onPlay(t); }} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 12.5, fontWeight: 700 }} className="truncate">{t.title}</div>
                <div style={{ fontSize: 10.5, color: 'rgb(var(--fg-muted))' }}>{t.version} · {t.uploaded}</div>
              </div>
              <span className="tabular" style={{ fontSize: 10.5, fontFamily: 'JetBrains Mono', color: 'rgb(var(--fg-muted))' }}>{t.duration}</span>
            </div>
          ))}
          {tracks.length === 0 && <div style={{ padding: 16, textAlign: 'center', color: 'rgb(var(--fg-muted))', fontSize: 12 }}>No songs uploaded yet.</div>}
        </div>
      </Card>

      <Card title="Client & collaborators" icon={<Icon name="users" size={14} />}>
        <div style={{ padding: 8 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '8px 10px', marginBottom: 4 }}>
            <Avatar initials={project.client.split(' ').map(s=>s[0]).join('').slice(0,2)} grad="grad-slate" size={36} />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 13, fontWeight: 700 }}>{project.client}</div>
              <div style={{ fontSize: 10.5, color: 'rgb(var(--fg-muted))' }}>Owner</div>
            </div>
            <button className="sk-pop" style={{ all: 'unset', cursor: 'pointer', padding: '6px 10px', borderRadius: 7, fontSize: 11, fontWeight: 600, background: 'rgb(var(--bg-elevated))', border: '1px solid rgb(var(--border-subtle))' }}>Message</button>
          </div>
          <button className="sk-pop sk-row" style={{ all: 'unset', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 10, padding: '10px', borderRadius: 8, color: 'rgb(var(--fg-muted))', fontSize: 12, width: '100%', boxSizing: 'border-box', border: '1px dashed rgb(var(--border-strong))' }}>
            <Icon name="user-plus" size={13} /> Invite collaborator
          </button>
        </div>
      </Card>
    </div>
  );
}

/* ----- Songs tab — Spotify-row pattern ----- */
function SongsTab({ tracks, onPlay, onOpenSong, currentTrackId, isPlaying, hoverTrack, setHoverTrack }) {
  if (tracks.length === 0) {
    return (
      <Card padded={false}>
        <div style={{ padding: 60, textAlign: 'center' }}>
          <Icon name="music" size={32} style={{ color: 'rgb(var(--fg-faint))', marginBottom: 10 }} />
          <div style={{ fontSize: 14, fontWeight: 700 }}>No songs yet</div>
          <div style={{ fontSize: 12, color: 'rgb(var(--fg-muted))', marginTop: 4 }}>Upload your first track to get started.</div>
          <button className="sk-pop" style={{ all: 'unset', cursor: 'pointer', marginTop: 14, padding: '9px 16px', borderRadius: 9, background: 'rgb(var(--brand-primary))', color: '#111009', fontSize: 12.5, fontWeight: 700, display: 'inline-flex', alignItems: 'center', gap: 6 }}>
            <Icon name="upload" size={13} /> Upload track
          </button>
        </div>
      </Card>
    );
  }
  return (
    <Card padded={false}>
      <div style={{ display: 'grid', gridTemplateColumns: '36px minmax(0,2fr) 80px 80px 80px 36px', alignItems: 'center', gap: 14, padding: '10px 18px', borderBottom: '1px solid rgb(var(--border-subtle))', background: 'rgb(var(--bg-elevated))' }}>
        <span className="label-tiny" style={{ textAlign: 'center', color: 'rgb(var(--fg-faint))' }}>#</span>
        <span className="label-tiny">Title</span>
        <span className="label-tiny" style={{ textAlign: 'right' }}>Version</span>
        <span className="label-tiny" style={{ textAlign: 'right' }}>Notes</span>
        <span className="label-tiny" style={{ textAlign: 'right' }}>Length</span>
        <span></span>
      </div>
      {tracks.map((t, i) => {
        const playingThis = currentTrackId === t.id && isPlaying;
        const hovered = hoverTrack === t.id;
        return (
          <div key={t.id} className="sk-row"
            onMouseEnter={() => setHoverTrack(t.id)} onMouseLeave={() => setHoverTrack(null)}
            onClick={() => onOpenSong(t.id)}
            style={{ display: 'grid', gridTemplateColumns: '36px minmax(0,2fr) 80px 80px 80px 36px', alignItems: 'center', gap: 14, padding: '12px 18px', borderBottom: i === tracks.length - 1 ? 'none' : '1px solid rgb(var(--border-subtle) / 0.6)', cursor: 'pointer', background: playingThis ? 'rgb(var(--brand-primary) / 0.05)' : 'transparent' }}>
            <span style={{ width: 36, height: 36, display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>
              {playingThis ? (
                <span role="button" tabIndex={0} onClick={(e) => { e.stopPropagation(); onPlay(t); }} className="sk-pop" style={{ width: 28, height: 28, borderRadius: '50%', background: 'rgb(var(--brand-primary-dark))', color: '#fff', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}><Icon name="pause" size={11} strokeWidth={2.6} /></span>
              ) : hovered ? (
                <span role="button" tabIndex={0} onClick={(e) => { e.stopPropagation(); onPlay(t); }} className="sk-pop" style={{ width: 28, height: 28, borderRadius: '50%', background: 'rgb(var(--fg-default))', color: 'rgb(var(--bg-default))', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}><Icon name="play" size={11} strokeWidth={2.6} /></span>
              ) : (
                <span style={{ fontFamily: 'JetBrains Mono', fontSize: 11.5, color: 'rgb(var(--fg-faint))' }}>{i + 1}</span>
              )}
            </span>
            <div style={{ minWidth: 0, display: 'flex', alignItems: 'center', gap: 6 }}>
              {playingThis && <EqBars playing />}
              <div style={{ minWidth: 0 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: playingThis ? 'rgb(var(--brand-primary-dark))' : 'rgb(var(--fg-default))' }} className="truncate">{t.title}</div>
                <div style={{ fontSize: 10.5, color: 'rgb(var(--fg-muted))' }}>{t.bpm} BPM · {t.mkey} · uploaded {t.uploaded}</div>
              </div>
            </div>
            <span className="pill" style={{ fontSize: 10, background: 'rgb(var(--bg-elevated))', color: 'rgb(var(--fg-default))', border: '1px solid rgb(var(--border-subtle))', justifySelf: 'end' }}>{t.version}</span>
            <span style={{ textAlign: 'right', fontSize: 11.5, color: t.comments > 0 ? 'rgb(var(--fg-default))' : 'rgb(var(--fg-faint))', fontFamily: 'JetBrains Mono' }} className="tabular">{t.comments > 0 ? t.comments : '—'}</span>
            <span className="tabular" style={{ textAlign: 'right', fontSize: 12, fontFamily: 'JetBrains Mono' }}>{t.duration}</span>
            <span onClick={(e) => e.stopPropagation()} style={{ justifySelf: 'end' }}>
              <KebabMenu items={[
                { label: 'Open song', icon: 'external-link', onClick: () => onOpenSong(t.id) },
                { label: 'Download', icon: 'download', onClick: () => {} },
                { label: 'Share with artist', icon: 'share-2', onClick: () => {} },
                { label: 'Upload new version', icon: 'upload', onClick: () => {} },
                { label: 'Delete', icon: 'trash-2', onClick: () => {}, danger: true },
              ]} />
            </span>
          </div>
        );
      })}
    </Card>
  );
}

/* ----- Files tab ----- */
function FilesTab({ project }) {
  const files = [
    { id: 'f1', name: 'Brief & references.pdf',     kind: 'doc',   size: '2.4 MB', when: '3 weeks ago', icon: 'file-text' },
    { id: 'f2', name: 'Stems_Bridge_v2.zip',         kind: 'stems', size: '184 MB', when: '4 days ago',  icon: 'package' },
    { id: 'f3', name: 'Producer_Agreement.signed.pdf',kind: 'doc',  size: '0.8 MB', when: '2 weeks ago', icon: 'file-text' },
    { id: 'f4', name: 'Reference_Mix_Wilco.mp3',     kind: 'ref',   size: '7.1 MB', when: '3 weeks ago', icon: 'music' },
    { id: 'f5', name: 'Cover_Sketch_v3.png',         kind: 'art',   size: '4.2 MB', when: '1 week ago',  icon: 'image' },
  ];
  return (
    <Card padded={false}>
      <div style={{ padding: '10px 18px', borderBottom: '1px solid rgb(var(--border-subtle))', background: 'rgb(var(--bg-elevated))', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <span className="label-tiny">{files.length} files · 198 MB total</span>
        <button className="sk-pop" style={{ all: 'unset', cursor: 'pointer', padding: '6px 12px', borderRadius: 7, fontSize: 11.5, fontWeight: 700, background: 'rgb(var(--fg-default))', color: 'rgb(var(--bg-default))', display: 'inline-flex', alignItems: 'center', gap: 5 }}>
          <Icon name="upload" size={12} /> Upload file
        </button>
      </div>
      {files.map((f, i) => (
        <div key={f.id} className="sk-row" style={{ display: 'flex', alignItems: 'center', gap: 14, padding: '12px 18px', borderBottom: i === files.length - 1 ? 'none' : '1px solid rgb(var(--border-subtle) / 0.6)', cursor: 'pointer' }}>
          <span style={{ width: 36, height: 36, borderRadius: 8, background: 'rgb(var(--bg-elevated))', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', color: 'rgb(var(--fg-muted))' }}><Icon name={f.icon} size={15} /></span>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 13, fontWeight: 600 }} className="truncate">{f.name}</div>
            <div style={{ fontSize: 10.5, color: 'rgb(var(--fg-muted))' }}>{f.kind} · {f.size} · {f.when}</div>
          </div>
          <button className="sk-pop" style={{ all: 'unset', cursor: 'pointer', width: 30, height: 30, borderRadius: 7, color: 'rgb(var(--fg-muted))', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }} title="Download"><Icon name="download" size={13} /></button>
          <KebabMenu items={[
            { label: 'Download', icon: 'download', onClick: () => {} },
            { label: 'Copy share link', icon: 'link', onClick: () => {} },
            { label: 'Rename', icon: 'edit-3', onClick: () => {} },
            { label: 'Delete', icon: 'trash-2', onClick: () => {}, danger: true },
          ]} />
        </div>
      ))}
    </Card>
  );
}

/* ----- Payments tab ----- */
function PaymentsTab({ project }) {
  const balance = project.total - project.paid;
  const milestones = [
    { id: 'm1', label: 'Deposit',     amount: project.total * 0.3, status: 'paid' },
    { id: 'm2', label: 'Mid-project', amount: project.total * 0.4, status: project.paid >= project.total * 0.7 ? 'paid' : (project.paid >= project.total * 0.3 ? 'pending' : 'upcoming') },
    { id: 'm3', label: 'Final',       amount: project.total * 0.3, status: project.paid >= project.total ? 'paid' : 'upcoming' },
  ];
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
      <Card title={balance > 0 ? 'Outstanding balance' : 'Settled'} icon={<Icon name="dollar-sign" size={14} />}>
        <div style={{ padding: 16, display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>
          {[['Total', project.total, null], ['Paid', project.paid, 'success'], ['Balance', balance, balance > 0 ? 'danger' : 'success']].map(([l, v, accent]) => (
            <div key={l} style={{ padding: 14, borderRadius: 10, background: accent === 'danger' ? 'rgb(var(--fg-danger) / 0.06)' : (accent === 'success' ? 'rgb(var(--fg-success) / 0.06)' : 'rgb(var(--bg-elevated))'), border: '1px solid ' + (accent === 'danger' ? 'rgb(var(--fg-danger) / 0.2)' : (accent === 'success' ? 'rgb(var(--fg-success) / 0.2)' : 'rgb(var(--border-subtle))')) }}>
              <div className="label-tiny" style={{ marginBottom: 6 }}>{l}</div>
              <div className="tabular" style={{ fontSize: 22, fontWeight: 800, fontFamily: 'JetBrains Mono', color: accent === 'danger' ? 'rgb(var(--fg-danger))' : (accent === 'success' ? 'rgb(var(--fg-success))' : 'rgb(var(--fg-default))') }}>${(typeof v === 'number' ? v : 0).toLocaleString()}</div>
            </div>
          ))}
        </div>
        {balance > 0 && (
          <div style={{ padding: '0 16px 16px', display: 'flex', gap: 8 }}>
            <button className="sk-pop" style={{ all: 'unset', cursor: 'pointer', flex: 1, textAlign: 'center', padding: '12px 16px', borderRadius: 10, background: 'rgb(var(--fg-default))', color: 'rgb(var(--bg-default))', fontSize: 13, fontWeight: 700, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}><Icon name="send" size={13} />Send payment reminder</button>
            <button className="sk-pop" style={{ all: 'unset', cursor: 'pointer', padding: '12px 16px', borderRadius: 10, background: 'rgb(var(--bg-elevated))', color: 'rgb(var(--fg-default))', fontSize: 13, fontWeight: 600, border: '1px solid rgb(var(--border-subtle))', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}><Icon name="file-text" size={13} />Invoice</button>
          </div>
        )}
      </Card>

      <Card title="Milestones" icon={<Icon name="flag" size={14} />}>
        <div style={{ padding: 8 }}>
          {milestones.map((m, i) => (
            <div key={m.id} style={{ display: 'flex', alignItems: 'center', gap: 14, padding: '10px 12px', borderBottom: i === milestones.length - 1 ? 'none' : '1px solid rgb(var(--border-subtle) / 0.6)' }}>
              <span style={{ width: 8, height: 8, borderRadius: 4, background: m.status === 'paid' ? 'rgb(var(--fg-success))' : (m.status === 'pending' ? 'rgb(var(--fg-warning))' : 'rgb(var(--border-strong))') }} />
              <span style={{ flex: 1, fontSize: 13, fontWeight: 600 }}>{m.label}</span>
              <span className="tabular" style={{ fontSize: 13, fontWeight: 700, fontFamily: 'JetBrains Mono' }}>${Math.round(m.amount).toLocaleString()}</span>
              <span className="pill" style={{ fontSize: 9.5, background: m.status === 'paid' ? 'rgb(var(--fg-success) / 0.14)' : (m.status === 'pending' ? 'rgb(var(--fg-warning) / 0.16)' : 'rgb(var(--bg-elevated))'), color: m.status === 'paid' ? 'rgb(var(--fg-success))' : (m.status === 'pending' ? 'rgb(var(--fg-warning))' : 'rgb(var(--fg-muted))'), border: 'none' }}>{m.status.toUpperCase()}</span>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

/* ----- Activity tab ----- */
function ActivityTab({ project, tracks }) {
  const events = [
    { icon: 'upload',         text: `You uploaded ${tracks[0]?.title || 'a new mix'}`, when: '2h ago', who: 'You' },
    { icon: 'message-circle', text: 'Client commented at 1:30 in Bridge_Reference.mp3', when: '4h ago', who: project.client },
    { icon: 'check',          text: 'Mix v1 approved', when: 'Yesterday', who: project.client },
    { icon: 'calendar',       text: 'Recording session booked for Tuesday 14:00', when: '2d ago', who: 'You' },
    { icon: 'dollar-sign',    text: `Deposit received — $${(project.total * 0.3).toLocaleString()}`, when: '3w ago', who: project.client },
    { icon: 'file-text',      text: 'Producer agreement signed', when: '3w ago', who: project.client },
  ];
  return (
    <Card padded={false}>
      <div style={{ padding: 8 }}>
        {events.map((e, i) => (
          <div key={i} className="sk-row" style={{ display: 'flex', gap: 12, padding: '10px 12px', borderRadius: 8, alignItems: 'flex-start' }}>
            <span style={{ width: 30, height: 30, borderRadius: 15, background: 'rgb(var(--bg-elevated))', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, color: 'rgb(var(--fg-muted))', marginTop: 2 }}><Icon name={e.icon} size={13} /></span>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 13, fontWeight: 500 }}>{e.text}</div>
              <div style={{ fontSize: 10.5, color: 'rgb(var(--fg-faint))', marginTop: 2 }}>{e.who} · {e.when}</div>
            </div>
          </div>
        ))}
      </div>
    </Card>
  );
}

window.SK = window.SK || {};
Object.assign(window.SK, { ClientsProjectsTab, ProjectRoom });

</script>
<script type="text/babel" data-file="tabs/music.jsx">
/* global React, SK */
const { useState, useMemo, useEffect, useRef } = React;
const { Icon, Avatar, Card, StatusPill, ProjectBadge, fmtMoney, fmtTime, PlayCircle, Waveform, EqBars } = window.SK;

/* ============================================================
   MUSIC LIBRARY — entry point
   3-level structure per PRD:
   L1 Library (this) → L2 Project-Focused (drill-down) → L3 Song Page
   ============================================================ */

const SAMPLE_PLAYLISTS = [
  { id: 'pl1', name: 'Reference Bin',     count: 12, grad: 'grad-amber',  icon: 'sparkles' },
  { id: 'pl2', name: 'In Review · Today', count:  4, grad: 'grad-slate',  icon: 'clock' },
  { id: 'pl3', name: 'Mix Studies',       count:  8, grad: 'grad-violet', icon: 'flask-conical' },
];

function NowPlayingDot({ playing }) {
  if (!playing) return null;
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, color: 'rgb(var(--brand-primary-dark))', fontSize: 9.5, fontFamily: 'JetBrains Mono', fontWeight: 700 }}>
      <EqBars playing />
    </span>
  );
}

function KebabMenu({ items }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    if (!open) return;
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, [open]);

  return (
    <span ref={ref} style={{ position: 'relative', display: 'inline-flex' }} onClick={(e) => e.stopPropagation()}>
      <span role="button" tabIndex={0} onClick={() => setOpen(o => !o)} className="sk-pop" style={{ width: 28, height: 28, borderRadius: 6, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', color: 'rgb(var(--fg-muted))' }} aria-label="More actions">
        <Icon name="more-horizontal" size={15} />
      </span>
      {open && (
        <div role="menu" style={{ position: 'absolute', top: 32, right: 0, zIndex: 50, minWidth: 180, padding: 4, borderRadius: 10, background: 'rgb(var(--bg-default))', border: '1px solid rgb(var(--border-strong))', boxShadow: '0 12px 30px rgba(17,16,9,0.18)' }}>
          {items.map((it, i) => (
            <button key={i} onClick={() => { setOpen(false); it.onClick && it.onClick(); }} style={{ all: 'unset', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 9, padding: '8px 10px', borderRadius: 7, fontSize: 12.5, fontWeight: 500, color: it.danger ? 'rgb(var(--fg-danger))' : 'rgb(var(--fg-default))', width: '100%', boxSizing: 'border-box' }} className="sk-row">
              <Icon name={it.icon} size={13} style={{ color: it.danger ? 'rgb(var(--fg-danger))' : 'rgb(var(--fg-muted))' }} />
              {it.label}
              {it.shortcut && <span style={{ marginLeft: 'auto', fontSize: 10, fontFamily: 'JetBrains Mono', color: 'rgb(var(--fg-faint))' }}>{it.shortcut}</span>}
            </button>
          ))}
        </div>
      )}
    </span>
  );
}

function FavStar({ on, onToggle, size = 14 }) {
  return (
    <span role="button" tabIndex={0} onClick={(e) => { e.stopPropagation(); onToggle && onToggle(); }} className="sk-pop"
      style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', color: on ? 'rgb(var(--brand-primary-dark))' : 'rgb(var(--fg-faint))', width: 24, height: 24 }}
      aria-label={on ? 'Unfavorite' : 'Favorite'} title={on ? 'In Favorites' : 'Add to Favorites'}>
      <Icon name="star" size={size} fill={on ? 'currentColor' : 'none'} strokeWidth={2.4} />
    </span>
  );
}

function MusicLibraryTab({ onPlay, onOpenSong, viewMode = 'grid', currentTrackId, isPlaying }) {
  const d = window.SAMPLE_DATA;
  const [view, setView] = useState(viewMode);
  const [filter, setFilter] = useState('all');
  const [q, setQ] = useState('');
  const [sort, setSort] = useState('recent'); // recent | title | listens | length | comments
  const [favOverrides, setFavOverrides] = useState({});
  const [showAddSong, setShowAddSong] = useState(false);
  const [projFilter, setProjFilter] = useState(null); // projectId
  const isFav = (t) => favOverrides[t.id] !== undefined ? favOverrides[t.id] : t.favorite;
  const toggleFav = (id) => setFavOverrides(p => ({ ...p, [id]: !(p[id] !== undefined ? p[id] : d.tracks.find(t => t.id === id).favorite) }));

  const tracks = useMemo(() => {
    let out = d.tracks.slice();
    if (filter === 'fav') out = out.filter(t => isFav(t));
    if (filter === 'comments') out = out.filter(t => t.comments > 0);
    if (filter === 'recent') out = out.filter(t => ['today','yesterday','this week'].includes(t.uploadedRel));
    if (projFilter) out = out.filter(t => t.projectId === projFilter);
    if (q.trim()) {
      const Q = q.trim().toLowerCase();
      out = out.filter(t => t.title.toLowerCase().includes(Q) || t.client.toLowerCase().includes(Q) || t.project.toLowerCase().includes(Q));
    }
    out.sort((a, b) => {
      if (sort === 'title') return a.title.localeCompare(b.title);
      if (sort === 'listens') return b.plays - a.plays;
      if (sort === 'length') return a.durationSec - b.durationSec;
      if (sort === 'comments') return b.comments - a.comments;
      // recent — keep order; tracks are already roughly recent-first
      return 0;
    });
    return out;
  // eslint-disable-next-line
  }, [filter, q, sort, projFilter, favOverrides, d.tracks]);

  const groups = useMemo(() => {
    const out = {};
    tracks.forEach(t => { (out[t.project] = out[t.project] || []).push(t); });
    return out;
  }, [tracks]);

  const totalListens = d.tracks.reduce((a, t) => a + t.plays, 0);

  return (
    <div data-screen-label="03 Music Library" className="custom-scrollbar" style={{ flex: 1, overflowY: 'auto', padding: 'clamp(16px, 3vw, 32px)', maxWidth: 1180, margin: '0 auto', width: '100%' }}>
      <header className="reveal-up stagger-1" style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 16, marginBottom: 22, flexWrap: 'wrap' }}>
        <div>
          <span className="label-tiny" style={{ display: 'block', marginBottom: 6 }}>Archive</span>
          <h1 className="font-syne" style={{ fontFamily: 'Syne', fontSize: 'clamp(34px, 4.5vw, 52px)', fontWeight: 800, letterSpacing: '-0.035em', margin: 0, lineHeight: 0.95 }}>Music Library</h1>
          <p style={{ margin: '8px 0 0', fontSize: 13.5, color: 'rgb(var(--fg-muted))' }}>{d.tracks.length} tracks · {Object.keys(groups).length} projects · <span className="tabular" style={{ fontFamily: 'JetBrains Mono', color: 'rgb(var(--fg-default))' }}>{totalListens.toLocaleString()}</span> total plays</p>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <button onClick={() => setShowAddSong(true)} className="sk-pop" style={{ all: 'unset', cursor: 'pointer', padding: '10px 16px', borderRadius: 9, background: 'rgb(var(--brand-primary))', color: '#111009', fontSize: 12.5, fontWeight: 700, display: 'inline-flex', alignItems: 'center', gap: 6 }}>
            <Icon name="plus" size={14} strokeWidth={2.6} /> Add Song
          </button>
        </div>
      </header>

      {/* Custom Playlists rail */}
      <div className="reveal-up stagger-2" style={{ marginBottom: 18 }}>
        <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 8, padding: '0 2px' }}>
          <span className="label-tiny">Custom Playlists</span>
          <button className="sk-pop" style={{ all: 'unset', cursor: 'pointer', fontSize: 10.5, fontWeight: 700, color: 'rgb(var(--fg-muted))', textTransform: 'uppercase', letterSpacing: '0.08em' }}>New playlist +</button>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: 8 }}>
          {SAMPLE_PLAYLISTS.map(pl => (
            <button key={pl.id} className="sk-pop sk-row" style={{ all: 'unset', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 10, padding: 8, borderRadius: 12, background: 'rgb(var(--bg-elevated))', border: '1px solid rgb(var(--border-subtle))' }}>
              <span className={pl.grad} style={{ width: 40, height: 40, borderRadius: 8, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', color: '#fff', flexShrink: 0 }}>
                <Icon name={pl.icon} size={16} />
              </span>
              <div style={{ minWidth: 0, flex: 1 }}>
                <div style={{ fontSize: 12.5, fontWeight: 700 }} className="truncate">{pl.name}</div>
                <div style={{ fontSize: 10.5, color: 'rgb(var(--fg-muted))', fontFamily: 'JetBrains Mono' }}>{pl.count} tracks</div>
              </div>
            </button>
          ))}
        </div>
      </div>

      {/* Toolbar — search, filters, view toggle, sort */}
      <div className="reveal-up stagger-3" style={{ display: 'flex', gap: 8, marginBottom: 14, flexWrap: 'wrap', alignItems: 'center' }}>
        <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8, padding: '0 10px', borderRadius: 9, background: 'rgb(var(--bg-elevated))', border: '1px solid rgb(var(--border-subtle))', minWidth: 240, flex: '1 1 240px', maxWidth: 340 }}>
          <Icon name="search" size={13} style={{ color: 'rgb(var(--fg-muted))' }} />
          <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search tracks, artists, projects…" style={{ all: 'unset', flex: 1, fontSize: 12.5, padding: '9px 0', color: 'rgb(var(--fg-default))', fontFamily: 'inherit' }} />
          {q && <button onClick={() => setQ('')} className="sk-pop" style={{ all: 'unset', cursor: 'pointer', display: 'inline-flex', color: 'rgb(var(--fg-muted))' }} aria-label="Clear search"><Icon name="x" size={13} /></button>}
        </div>

        <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
          {[['all','All'],['recent','Recent'],['comments','Has notes'],['fav','Favorites']].map(([k,l]) => (
            <button key={k} onClick={() => setFilter(k)} className="sk-pop" style={{ all: 'unset', cursor: 'pointer', padding: '7px 12px', borderRadius: 16, fontSize: 11.5, fontWeight: 600, background: filter === k ? 'rgb(var(--fg-default))' : 'transparent', color: filter === k ? 'rgb(var(--bg-default))' : 'rgb(var(--fg-muted))', border: '1px solid ' + (filter === k ? 'rgb(var(--fg-default))' : 'rgb(var(--border-subtle))') }}>{l}</button>
          ))}
          <select value={projFilter || ''} onChange={(e) => setProjFilter(e.target.value || null)} style={{ all: 'unset', cursor: 'pointer', padding: '7px 28px 7px 12px', borderRadius: 16, fontSize: 11.5, fontWeight: 600, background: projFilter ? 'rgb(var(--fg-default))' : 'transparent', color: projFilter ? 'rgb(var(--bg-default))' : 'rgb(var(--fg-muted))', border: '1px solid ' + (projFilter ? 'rgb(var(--fg-default))' : 'rgb(var(--border-subtle))'), backgroundImage: 'url("data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'10\' height=\'10\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\'><polyline points=\'6 9 12 15 18 9\'/></svg>")', backgroundRepeat: 'no-repeat', backgroundPosition: 'right 10px center' }}>
            <option value="">All projects</option>
            {d.projects.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
        </div>

        <div style={{ marginLeft: 'auto', display: 'flex', gap: 8, alignItems: 'center' }}>
          {(view === 'table' || view === 'hybrid') && (
            <label style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 11, color: 'rgb(var(--fg-muted))' }}>
              Sort
              <select value={sort} onChange={(e) => setSort(e.target.value)} style={{ all: 'unset', cursor: 'pointer', padding: '6px 24px 6px 10px', borderRadius: 7, fontSize: 11.5, fontWeight: 600, background: 'rgb(var(--bg-elevated))', border: '1px solid rgb(var(--border-subtle))', color: 'rgb(var(--fg-default))', backgroundImage: 'url("data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'10\' height=\'10\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\'><polyline points=\'6 9 12 15 18 9\'/></svg>")', backgroundRepeat: 'no-repeat', backgroundPosition: 'right 8px center' }}>
                <option value="recent">Most recent</option>
                <option value="title">Title (A→Z)</option>
                <option value="listens">Most plays</option>
                <option value="comments">Most notes</option>
                <option value="length">Length</option>
              </select>
            </label>
          )}
          <div style={{ display: 'inline-flex', padding: 3, borderRadius: 9, background: 'rgb(var(--bg-elevated))', border: '1px solid rgb(var(--border-subtle))' }}>
            {[['grid','grid-3x3','Grid'],['hybrid','layout-list','By project'],['table','list','Table']].map(([k, ic, label]) => (
              <button key={k} onClick={() => setView(k)} title={label} style={{ all: 'unset', cursor: 'pointer', padding: '6px 10px', borderRadius: 6, background: view === k ? 'rgb(var(--bg-default))' : 'transparent', color: view === k ? 'rgb(var(--fg-default))' : 'rgb(var(--fg-muted))' }} aria-label={label}>
                <Icon name={ic} size={14} />
              </button>
            ))}
          </div>
        </div>
      </div>

      {tracks.length === 0 ? (
        <div style={{ padding: 60, textAlign: 'center', color: 'rgb(var(--fg-muted))' }}>
          <Icon name="search" size={28} style={{ marginBottom: 10, color: 'rgb(var(--fg-faint))' }} />
          <div style={{ fontSize: 14, fontWeight: 700 }}>No tracks match those filters</div>
          <div style={{ fontSize: 12, marginTop: 4 }}>Try clearing search or switching to All.</div>
        </div>
      ) : view === 'grid' ? (
        <GridView tracks={tracks} onPlay={onPlay} onOpenSong={onOpenSong} currentTrackId={currentTrackId} isPlaying={isPlaying} isFav={isFav} toggleFav={toggleFav} />
      ) : view === 'table' ? (
        <TableView tracks={tracks} onPlay={onPlay} onOpenSong={onOpenSong} currentTrackId={currentTrackId} isPlaying={isPlaying} isFav={isFav} toggleFav={toggleFav} sort={sort} setSort={setSort} />
      ) : (
        <HybridView groups={groups} onPlay={onPlay} onOpenSong={onOpenSong} currentTrackId={currentTrackId} isPlaying={isPlaying} isFav={isFav} toggleFav={toggleFav} />
      )}

      {showAddSong && <AddSongModal projects={d.projects} onClose={() => setShowAddSong(false)} />}
    </div>
  );
}

/* ============================================================
   GRID VIEW
   ============================================================ */
function GridView({ tracks, onPlay, onOpenSong, currentTrackId, isPlaying, isFav, toggleFav }) {
  return (
    <div className="reveal-up stagger-3" style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(220px, 1fr))', gap: 14 }}>
      {tracks.map((t) => {
        const playingThis = currentTrackId === t.id && isPlaying;
        return (
          <div key={t.id} className="sk-pop" style={{ display: 'flex', flexDirection: 'column', borderRadius: 14, overflow: 'hidden', background: 'rgb(var(--bg-elevated))', border: '1px solid ' + (playingThis ? 'rgb(var(--brand-primary) / 0.7)' : 'rgb(var(--border-subtle))'), cursor: 'pointer' }} onClick={() => onOpenSong(t.id)}>
            <div className={t.grad} style={{ position: 'relative', aspectRatio: '1.4 / 1', overflow: 'hidden' }}>
              <div style={{ position: 'absolute', inset: 0, padding: 12, display: 'flex', flexDirection: 'column', justifyContent: 'space-between', color: '#fff' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 8 }}>
                  <span onClick={(e) => { e.stopPropagation(); toggleFav(t.id); }} className="sk-pop" role="button" tabIndex={0} style={{ width: 24, height: 24, borderRadius: 6, background: 'rgba(0,0,0,0.32)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }} aria-label={isFav(t) ? 'Unfavorite' : 'Favorite'}>
                    <Icon name="star" size={11} fill={isFav(t) ? '#fff' : 'none'} strokeWidth={2.4} />
                  </span>
                  <span style={{ fontFamily: 'JetBrains Mono', fontSize: 9.5, fontWeight: 700, padding: '2px 6px', borderRadius: 4, background: 'rgba(0,0,0,0.32)' }}>{t.version}</span>
                </div>
                <span role="button" tabIndex={0} onClick={(e) => { e.stopPropagation(); onPlay(t); }} className="sk-pop" style={{ alignSelf: 'flex-start', width: 36, height: 36, borderRadius: '50%', background: '#fff', color: '#111009', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 4px 14px rgba(0,0,0,0.25)', cursor: 'pointer' }} aria-label={playingThis ? 'Pause' : 'Play'}>
                  <Icon name={playingThis ? 'pause' : 'play'} size={14} strokeWidth={2.6} />
                </span>
              </div>
              <div style={{ position: 'absolute', bottom: 8, right: 12, opacity: 0.55 }}>
                <Waveform bars={20} progress={0} height={20} dark seed={t.id.charCodeAt(0) || 4} />
              </div>
            </div>
            <div style={{ padding: 12 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 2 }}>
                {playingThis && <EqBars playing />}
                <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: '-0.01em', color: 'rgb(var(--fg-default))', flex: 1, minWidth: 0 }} className="truncate">{t.title}</div>
              </div>
              <div style={{ fontSize: 11, color: 'rgb(var(--fg-muted))' }} className="truncate">{t.project} · {t.client}</div>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 8, fontSize: 10.5, color: 'rgb(var(--fg-muted))' }}>
                <span style={{ display: 'inline-flex', alignItems: 'center', gap: 8 }}>
                  <span className="tabular" style={{ fontFamily: 'JetBrains Mono', display: 'inline-flex', alignItems: 'center', gap: 3 }}><Icon name="play" size={9} fill="currentColor" />{t.plays}</span>
                  {t.comments > 0 && <span style={{ display: 'inline-flex', alignItems: 'center', gap: 3 }}><Icon name="message-circle" size={10} />{t.comments}</span>}
                </span>
                <span className="tabular" style={{ fontFamily: 'JetBrains Mono' }}>{t.duration}</span>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ============================================================
   TABLE VIEW — Spotify-style track row with hover-play, sort, kebab
   ============================================================ */
function SortHeader({ label, sortKey, current, setSort, align = 'left' }) {
  if (!sortKey) return <span className="label-tiny" style={{ textAlign: align }}>{label}</span>;
  const active = current === sortKey;
  return (
    <button onClick={() => setSort(sortKey)} style={{ all: 'unset', cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: 4, fontSize: 9.5, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.1em', color: active ? 'rgb(var(--fg-default))' : 'rgb(var(--fg-muted))', justifySelf: align === 'right' ? 'end' : 'start' }} className="sk-pop">
      {label}
      {active && <Icon name="chevron-down" size={11} />}
    </button>
  );
}

function TableView({ tracks, onPlay, onOpenSong, currentTrackId, isPlaying, isFav, toggleFav, sort, setSort }) {
  const [hoveredId, setHoveredId] = useState(null);
  return (
    <Card padded={false} className="reveal-up stagger-4">
      {/* Header */}
      <div style={{ display: 'grid', gridTemplateColumns: '36px minmax(0,2.5fr) minmax(0,1.4fr) 80px 70px 70px 70px 36px', alignItems: 'center', gap: 14, padding: '10px 18px', borderBottom: '1px solid rgb(var(--border-subtle))', background: 'rgb(var(--bg-elevated))' }}>
        <span className="label-tiny" style={{ textAlign: 'center', color: 'rgb(var(--fg-faint))' }}>#</span>
        <SortHeader label="Title / Project" sortKey="title" current={sort} setSort={setSort} />
        <SortHeader label="Artist" sortKey={null} current={sort} setSort={setSort} />
        <SortHeader label="Version" sortKey={null} current={sort} setSort={setSort} />
        <SortHeader label="Plays" sortKey="listens" current={sort} setSort={setSort} align="right" />
        <SortHeader label="Notes" sortKey="comments" current={sort} setSort={setSort} align="right" />
        <SortHeader label="Length" sortKey="length" current={sort} setSort={setSort} align="right" />
        <span style={{ width: 16 }} />
      </div>
      {/* Rows */}
      {tracks.map((t, i) => {
        const playingThis = currentTrackId === t.id && isPlaying;
        const hovered = hoveredId === t.id;
        return (
          <div key={t.id} className="sk-row"
            onMouseEnter={() => setHoveredId(t.id)} onMouseLeave={() => setHoveredId(null)}
            onClick={() => onOpenSong(t.id)}
            style={{ display: 'grid', gridTemplateColumns: '36px minmax(0,2.5fr) minmax(0,1.4fr) 80px 70px 70px 70px 36px', alignItems: 'center', gap: 14, padding: '10px 18px', borderBottom: i === tracks.length - 1 ? 'none' : '1px solid rgb(var(--border-subtle) / 0.6)', cursor: 'pointer', background: playingThis ? 'rgb(var(--brand-primary) / 0.05)' : 'transparent' }}>

            {/* # / play / now-playing */}
            <span style={{ width: 36, height: 36, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', position: 'relative' }}>
              {playingThis ? (
                <span role="button" tabIndex={0} onClick={(e) => { e.stopPropagation(); onPlay(t); }} className="sk-pop" style={{ width: 28, height: 28, borderRadius: '50%', background: 'rgb(var(--brand-primary-dark))', color: '#fff', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }} aria-label="Pause"><Icon name="pause" size={11} strokeWidth={2.6} /></span>
              ) : hovered ? (
                <span role="button" tabIndex={0} onClick={(e) => { e.stopPropagation(); onPlay(t); }} className="sk-pop" style={{ width: 28, height: 28, borderRadius: '50%', background: 'rgb(var(--fg-default))', color: 'rgb(var(--bg-default))', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }} aria-label="Play"><Icon name="play" size={11} strokeWidth={2.6} /></span>
              ) : (
                <span style={{ fontFamily: 'JetBrains Mono', fontSize: 11.5, color: 'rgb(var(--fg-faint))' }}>{i + 1}</span>
              )}
            </span>

            {/* Title + project */}
            <div style={{ minWidth: 0, display: 'flex', alignItems: 'center', gap: 10 }}>
              <ProjectBadge grad={t.grad} size={32} rounded={6} icon="music" />
              <div style={{ minWidth: 0 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: playingThis ? 'rgb(var(--brand-primary-dark))' : 'rgb(var(--fg-default))', display: 'flex', alignItems: 'center', gap: 6 }}>
                  <span className="truncate" style={{ minWidth: 0 }}>{t.title}</span>
                </div>
                <div style={{ fontSize: 11, color: 'rgb(var(--fg-muted))' }} className="truncate">{t.project}</div>
              </div>
            </div>

            {/* Artist */}
            <span style={{ fontSize: 12, color: 'rgb(var(--fg-muted))' }} className="truncate">{t.client}</span>

            {/* Version */}
            <span className="pill" style={{ fontSize: 10, background: 'rgb(var(--bg-elevated))', color: 'rgb(var(--fg-default))', border: '1px solid rgb(var(--border-subtle))', justifySelf: 'start' }}>{t.version}</span>

            {/* Plays */}
            <span className="tabular" style={{ textAlign: 'right', fontSize: 11.5, fontFamily: 'JetBrains Mono', color: 'rgb(var(--fg-muted))' }}>{t.plays}</span>

            {/* Notes */}
            <span style={{ textAlign: 'right', fontSize: 11.5, color: t.comments > 0 ? 'rgb(var(--fg-default))' : 'rgb(var(--fg-faint))', fontFamily: 'JetBrains Mono' }} className="tabular">{t.comments > 0 ? t.comments : '—'}</span>

            {/* Length */}
            <span className="tabular" style={{ textAlign: 'right', fontSize: 12, fontFamily: 'JetBrains Mono' }}>{t.duration}</span>

            {/* Actions: fav (always) + kebab (on hover or always small) */}
            <span style={{ display: 'inline-flex', gap: 2, alignItems: 'center', justifySelf: 'end' }} onClick={(e) => e.stopPropagation()}>
              <FavStar on={isFav(t)} onToggle={() => toggleFav(t.id)} />
              <KebabMenu items={[
                { label: 'Open song', icon: 'external-link', onClick: () => onOpenSong(t.id) },
                { label: 'Play', icon: 'play', onClick: () => onPlay(t), shortcut: 'Space' },
                { label: 'Download', icon: 'download', onClick: () => {} },
                { label: 'Copy share link', icon: 'link', onClick: () => {} },
                { label: 'Add to playlist', icon: 'list-plus', onClick: () => {} },
                { label: 'Upload new version', icon: 'upload', onClick: () => {} },
                { label: 'Delete', icon: 'trash-2', onClick: () => {}, danger: true },
              ]} />
            </span>
          </div>
        );
      })}
    </Card>
  );
}

/* ============================================================
   HYBRID VIEW — grouped by project
   ============================================================ */
function HybridView({ groups, onPlay, onOpenSong, currentTrackId, isPlaying, isFav, toggleFav }) {
  return (
    <div className="reveal-up stagger-4" style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
      {Object.entries(groups).map(([proj, list]) => (
        <div key={proj}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8, padding: '0 4px' }}>
            <ProjectBadge grad={list[0].grad} size={20} rounded={5} icon="folder" />
            <h3 className="font-syne" style={{ margin: 0, fontSize: 15, fontWeight: 700, letterSpacing: '-0.01em' }}>{proj}</h3>
            <span className="label-tiny">{list.length} {list.length === 1 ? 'track' : 'tracks'}</span>
            <span className="label-tiny" style={{ marginLeft: 'auto', fontFamily: 'JetBrains Mono' }}>{list.reduce((a, t) => a + t.plays, 0)} plays</span>
          </div>
          <Card padded={false}>
            {list.map((t, i) => {
              const playingThis = currentTrackId === t.id && isPlaying;
              return (
                <div key={t.id} className="sk-row" onClick={() => onOpenSong(t.id)} style={{ display: 'grid', gridTemplateColumns: '36px 200px minmax(0,1fr) 60px 60px 28px 28px', alignItems: 'center', gap: 12, padding: '12px 16px', borderBottom: i === list.length - 1 ? 'none' : '1px solid rgb(var(--border-subtle) / 0.6)', cursor: 'pointer', background: playingThis ? 'rgb(var(--brand-primary) / 0.05)' : 'transparent' }}>
                  <PlayCircle size={32} playing={playingThis} onClick={(e) => { e?.stopPropagation?.(); onPlay(t); }} />
                  <div style={{ minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, display: 'flex', alignItems: 'center', gap: 6, color: playingThis ? 'rgb(var(--brand-primary-dark))' : 'rgb(var(--fg-default))' }} className="truncate">{t.title}</div>
                    <div style={{ fontSize: 11, color: 'rgb(var(--fg-muted))' }}>{t.version} · {t.bpm} BPM · {t.mkey}</div>
                  </div>
                  <div style={{ minWidth: 0, opacity: playingThis ? 1 : 0.6 }}>
                    <Waveform bars={48} progress={playingThis ? 0.32 : 0} height={24} seed={t.id.charCodeAt(0) || 3} />
                  </div>
                  <span className="tabular" style={{ fontSize: 11, fontFamily: 'JetBrains Mono', color: 'rgb(var(--fg-muted))', textAlign: 'right' }}>{t.plays} pl</span>
                  <span className="tabular" style={{ fontSize: 12, fontFamily: 'JetBrains Mono', color: 'rgb(var(--fg-muted))', textAlign: 'right' }}>{t.duration}</span>
                  <span onClick={(e) => e.stopPropagation()}><FavStar on={isFav(t)} onToggle={() => toggleFav(t.id)} /></span>
                  <span onClick={(e) => e.stopPropagation()}>
                    <KebabMenu items={[
                      { label: 'Open song', icon: 'external-link', onClick: () => onOpenSong(t.id) },
                      { label: 'Download', icon: 'download', onClick: () => {} },
                      { label: 'Copy share link', icon: 'link', onClick: () => {} },
                      { label: 'Upload new version', icon: 'upload', onClick: () => {} },
                      { label: 'Delete', icon: 'trash-2', onClick: () => {}, danger: true },
                    ]} />
                  </span>
                </div>
              );
            })}
          </Card>
        </div>
      ))}
    </div>
  );
}

          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            <div style={{ padding: 10, borderRadius: 10, background: 'rgb(var(--bg-elevated))', border: '1px solid rgb(var(--border-subtle))', display: 'flex', alignItems: 'center', gap: 10 }}>
              <span style={{ width: 36, height: 36, borderRadius: 8, background: 'rgb(var(--brand-primary) / 0.18)', color: 'rgb(var(--brand-primary-dark))', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}><Icon name="file-audio" size={16} /></span>

  );

/* ============================================================
   SONG PAGE — large waveform + timestamp comments
   ============================================================ */
function SongPage({ trackId, onBack, onPlay, playing, progress, onScrub, crumbs, isOverlay }) {
  const d = window.SAMPLE_DATA;
  const t = d.tracks.find(x => x.id === trackId) || d.tracks[0];
  const idx = d.tracks.findIndex(x => x.id === t.id);
  const prev = idx > 0 ? d.tracks[idx - 1] : null;
  const next = idx < d.tracks.length - 1 ? d.tracks[idx + 1] : null;
  const [activeVersion, setActiveVersion] = useState(t.versions[0]);
  const [draft, setDraft] = useState('');
  const [resolved, setResolved] = useState({});
  const [showResolved, setShowResolved] = useState(false);
  const [fav, setFav] = useState(t.favorite);
  const sec = (t.durationSec || 240) * progress;

  const allComments = (d.comments[t.id] || []).slice().sort((a, b) => a.at - b.at);
  const visibleComments = showResolved ? allComments : allComments.filter(c => !resolved[c.id]);

  // Reset version on track change
  useEffect(() => { setActiveVersion(t.versions[0]); setFav(t.favorite); }, [trackId]); // eslint-disable-line

  // Keyboard shortcuts
  useEffect(() => {
    const onKey = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.code === 'Space') { e.preventDefault(); onPlay(t); }
      else if (e.code === 'ArrowRight') { e.preventDefault(); onScrub(Math.min(1, progress + 0.05)); }
      else if (e.code === 'ArrowLeft') { e.preventDefault(); onScrub(Math.max(0, progress - 0.05)); }
      else if (e.code === 'KeyL') { setFav(f => !f); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [progress, t, onPlay, onScrub]);

  return (
    <div data-screen-label={`03b Song — ${t.title}`} className="custom-scrollbar" style={{ flex: 1, overflowY: 'auto' }}>
      {/* Hero gradient header */}
      <div className={t.grad} style={{ position: 'relative', color: '#fff', padding: 'clamp(20px, 3vw, 32px) clamp(16px, 3vw, 32px) 24px' }}>
        <div style={{ maxWidth: 1100, margin: '0 auto' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16, gap: 12, flexWrap: 'wrap' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 14, flexWrap: 'wrap' }}>
              <window.SK.BackButton onClick={onBack} label={isOverlay ? 'Close' : 'Back'} />
              {!isOverlay && <window.SK.Breadcrumbs items={crumbs && crumbs.length > 0 ? crumbs.map((c, i, arr) => i === arr.length - 1 ? { ...c, label: t.title, current: true } : c) : [{ label: 'Music Library', onClick: onBack }, { label: t.title, current: true }]} />}
              {isOverlay && <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.78)' }}>Now playing</span>}
            </div>
            <div style={{ display: 'flex', gap: 4 }}>
              <button disabled={!prev} onClick={() => prev && onOpenAnother(prev.id)} className="sk-pop" style={{ all: 'unset', cursor: prev ? 'pointer' : 'not-allowed', padding: '6px 10px', borderRadius: 7, fontSize: 11, fontWeight: 600, color: '#fff', display: 'inline-flex', alignItems: 'center', gap: 4, border: '1px solid rgba(255,255,255,0.22)', opacity: prev ? 1 : 0.4, background: 'rgba(255,255,255,0.10)' }} title={prev ? prev.title : 'No previous track'}>
                <Icon name="chevron-left" size={12} /> Prev
              </button>
              <button disabled={!next} onClick={() => next && onOpenAnother(next.id)} className="sk-pop" style={{ all: 'unset', cursor: next ? 'pointer' : 'not-allowed', padding: '6px 10px', borderRadius: 7, fontSize: 11, fontWeight: 600, color: '#fff', display: 'inline-flex', alignItems: 'center', gap: 4, border: '1px solid rgba(255,255,255,0.22)', opacity: next ? 1 : 0.4, background: 'rgba(255,255,255,0.10)' }} title={next ? next.title : 'No next track'}>
                Next <Icon name="chevron-right" size={12} />
              </button>
            </div>
          </div>

          <div style={{ display: 'flex', alignItems: 'flex-end', gap: 18, flexWrap: 'wrap' }}>
            <div style={{ width: 110, height: 110, borderRadius: 14, background: 'rgba(0,0,0,0.18)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, boxShadow: '0 12px 32px rgba(0,0,0,0.28)', position: 'relative' }}>
              <Icon name="audio-waveform" size={42} strokeWidth={1.5} />
              <span role="button" tabIndex={0} onClick={() => onPlay(t)} className="sk-pop" style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.18)', borderRadius: 14, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', opacity: 0, transition: 'opacity 180ms' }} onMouseEnter={(e) => e.currentTarget.style.opacity = '1'} onMouseLeave={(e) => e.currentTarget.style.opacity = '0'} aria-label={playing ? 'Pause' : 'Play'}>
                <span style={{ width: 50, height: 50, borderRadius: '50%', background: '#fff', color: '#111009', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 8px 20px rgba(0,0,0,0.24)' }}>
                  <Icon name={playing ? 'pause' : 'play'} size={20} strokeWidth={2.4} fill="currentColor" />
                </span>
              </span>
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <span style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', opacity: 0.78 }}>Song · {t.project}</span>
              <h1 className="font-syne" style={{ fontSize: 'clamp(28px, 4vw, 48px)', fontWeight: 800, letterSpacing: '-0.03em', margin: '4px 0 8px', lineHeight: 1, textShadow: '0 2px 14px rgba(0,0,0,0.18)' }}>{t.title}</h1>
              <div style={{ fontSize: 13, display: 'flex', flexWrap: 'wrap', gap: 14, alignItems: 'center', opacity: 0.92 }}>
                <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5 }}><Icon name="user" size={12} />{t.client}</span>
                <span>·</span>
                <span className="tabular" style={{ fontFamily: 'JetBrains Mono', fontWeight: 600 }}>{t.bpm} BPM</span>
                <span>·</span>
                <span className="tabular" style={{ fontFamily: 'JetBrains Mono', fontWeight: 600 }}>{t.mkey}</span>
                <span>·</span>
                <span className="tabular" style={{ fontFamily: 'JetBrains Mono' }}>{t.duration}</span>
                <span>·</span>
                <span className="tabular" style={{ fontFamily: 'JetBrains Mono', display: 'inline-flex', alignItems: 'center', gap: 3 }}><Icon name="play" size={10} fill="currentColor" />{t.plays} plays</span>
                <span>·</span>
                <span>uploaded {t.uploaded}</span>
              </div>

              {/* Version switcher */}
              <div style={{ display: 'flex', gap: 6, marginTop: 14, flexWrap: 'wrap', alignItems: 'center' }}>
                <span style={{ fontSize: 9.5, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', opacity: 0.72, marginRight: 4 }}>Version</span>
                {t.versions.map((v) => (
                  <button key={v} onClick={() => setActiveVersion(v)} className="sk-pop" style={{ all: 'unset', cursor: 'pointer', padding: '4px 10px', fontSize: 10.5, fontWeight: 700, fontFamily: 'JetBrains Mono', borderRadius: 12, background: activeVersion === v ? '#fff' : 'rgba(255,255,255,0.14)', color: activeVersion === v ? '#111009' : '#fff', border: '1px solid ' + (activeVersion === v ? '#fff' : 'rgba(255,255,255,0.22)') }}>{v}{v === t.versions[0] && activeVersion === v ? ' · current' : ''}</button>
                ))}
              </div>
            </div>

            {/* Action rail (overlay) */}
            <div style={{ display: 'flex', gap: 6, flexShrink: 0, alignItems: 'center' }}>
              <button onClick={() => onPlay(t)} className="sk-pop" style={{ all: 'unset', cursor: 'pointer', padding: '11px 18px', borderRadius: 24, background: '#fff', color: '#111009', fontSize: 13, fontWeight: 800, display: 'inline-flex', alignItems: 'center', gap: 7, boxShadow: '0 6px 18px rgba(0,0,0,0.24)' }}>
                <Icon name={playing ? 'pause' : 'play'} size={14} fill="currentColor" /> {playing ? 'Pause' : 'Play'}
              </button>
              <button onClick={() => setFav(f => !f)} className="sk-pop" title={fav ? 'In Favorites' : 'Add to Favorites'} aria-label="Favorite" style={{ all: 'unset', cursor: 'pointer', width: 38, height: 38, borderRadius: 19, background: fav ? '#fff' : 'rgba(255,255,255,0.14)', color: fav ? 'rgb(var(--brand-primary-dark))' : '#fff', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', border: '1px solid ' + (fav ? '#fff' : 'rgba(255,255,255,0.22)') }}>
                <Icon name="star" size={15} fill={fav ? 'currentColor' : 'none'} strokeWidth={2.4} />
              </button>
              <button title="Share with artist" aria-label="Share" className="sk-pop" style={{ all: 'unset', cursor: 'pointer', width: 38, height: 38, borderRadius: 19, background: 'rgba(255,255,255,0.14)', color: '#fff', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', border: '1px solid rgba(255,255,255,0.22)' }}>
                <Icon name="share-2" size={15} />
              </button>
              <button title="Download" aria-label="Download" className="sk-pop" style={{ all: 'unset', cursor: 'pointer', width: 38, height: 38, borderRadius: 19, background: 'rgba(255,255,255,0.14)', color: '#fff', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', border: '1px solid rgba(255,255,255,0.22)' }}>
                <Icon name="download" size={15} />
              </button>
            </div>
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 1100, margin: '0 auto', padding: 'clamp(16px, 3vw, 28px)' }}>
      {/* Big waveform with comments */}
      <Card padded={false} className="reveal-up stagger-2">
        <div style={{ padding: '20px 22px 18px', background: 'rgb(var(--bg-elevated) / 0.6)' }}>
          <div style={{ paddingTop: 8 }}>
            <Waveform bars={96} progress={progress} height={88} comments={visibleComments} durationSec={t.durationSec} onScrub={onScrub} seed={t.id.charCodeAt(0) || 7} />
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 10, fontSize: 11, fontFamily: 'JetBrains Mono', color: 'rgb(var(--fg-muted))', alignItems: 'center' }}>
            <span className="tabular">{fmtTime(sec)}</span>
            <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
              <button onClick={() => onScrub(Math.max(0, progress - 0.05))} className="sk-pop" style={{ all: 'unset', cursor: 'pointer', width: 28, height: 28, borderRadius: 14, color: 'rgb(var(--fg-muted))', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }} title="Skip back 5%"><Icon name="chevron-left" size={14} /></button>
              <button onClick={() => onPlay(t)} className="sk-pop" style={{ all: 'unset', cursor: 'pointer', width: 40, height: 40, borderRadius: 20, background: 'rgb(var(--fg-default))', color: 'rgb(var(--bg-default))', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>
                <Icon name={playing ? 'pause' : 'play'} size={15} strokeWidth={2.6} />
              </button>
              <button onClick={() => onScrub(Math.min(1, progress + 0.05))} className="sk-pop" style={{ all: 'unset', cursor: 'pointer', width: 28, height: 28, borderRadius: 14, color: 'rgb(var(--fg-muted))', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }} title="Skip ahead 5%"><Icon name="chevron-right" size={14} /></button>
            </div>
            <span className="tabular">{t.duration}</span>
          </div>
          <div style={{ marginTop: 10, fontSize: 10, color: 'rgb(var(--fg-faint))', textAlign: 'center', fontFamily: 'JetBrains Mono', letterSpacing: '0.05em' }}>SPACE play/pause · ←/→ skip · L favorite</div>
        </div>
      </Card>

      {/* Comments */}
      <div className="reveal-up stagger-3" style={{ marginTop: 18 }}>
        <Card title={`Notes at timestamp · ${visibleComments.length}${allComments.length !== visibleComments.length ? ` of ${allComments.length}` : ''}`}
              icon={<Icon name="message-circle" size={14} />}
              action={allComments.some(c => resolved[c.id]) ? (
                <button onClick={() => setShowResolved(s => !s)} className="sk-pop" style={{ all: 'unset', cursor: 'pointer', fontSize: 10.5, fontWeight: 700, color: 'rgb(var(--fg-muted))', textTransform: 'uppercase', letterSpacing: '0.08em' }}>{showResolved ? 'Hide resolved' : 'Show resolved'}</button>
              ) : null}>
          <div style={{ padding: 8 }}>
            {visibleComments.length === 0 ? (
              <div style={{ padding: 30, textAlign: 'center', color: 'rgb(var(--fg-muted))', fontSize: 13 }}>No notes yet. Click the waveform to drop one at a specific timestamp.</div>
            ) : (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                {visibleComments.map((c) => {
                  const isResolved = !!resolved[c.id];
                  return (
                    <div key={c.id} className="sk-row" style={{ display: 'flex', gap: 12, padding: '10px 12px', borderRadius: 10, alignItems: 'flex-start', background: c.mine ? 'rgb(var(--brand-primary) / 0.06)' : 'transparent', opacity: isResolved ? 0.55 : 1 }}>
                      <Avatar initials={c.initials} grad={c.mine ? 'grad-amber' : 'grad-slate'} size={32} />
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 3, flexWrap: 'wrap' }}>
                          <span style={{ fontSize: 12.5, fontWeight: 700 }}>{c.who}</span>
                          <button onClick={() => onScrub(c.at / t.durationSec)} className="pill pill-brand tabular sk-pop" style={{ fontSize: 9.5, fontFamily: 'JetBrains Mono', cursor: 'pointer', border: 'none' }}>@{fmtTime(c.at)}</button>
                          <span style={{ fontSize: 10.5, color: 'rgb(var(--fg-faint))' }}>{c.when}</span>
                          {isResolved && <span className="pill pill-success" style={{ fontSize: 9 }}>✓ RESOLVED</span>}
                        </div>
                        <p style={{ margin: 0, fontSize: 13, color: 'rgb(var(--fg-default))', lineHeight: 1.5, textDecoration: isResolved ? 'line-through' : 'none' }}>{c.text}</p>
                        <div style={{ display: 'flex', gap: 12, marginTop: 6 }}>
                          <button onClick={() => onScrub(c.at / t.durationSec)} className="sk-pop" style={{ all: 'unset', cursor: 'pointer', fontSize: 10.5, fontWeight: 600, color: 'rgb(var(--fg-muted))' }}>Jump to</button>
                          <button className="sk-pop" style={{ all: 'unset', cursor: 'pointer', fontSize: 10.5, fontWeight: 600, color: 'rgb(var(--fg-muted))' }}>Reply</button>
                          <button onClick={() => setResolved(p => ({ ...p, [c.id]: !p[c.id] }))} className="sk-pop" style={{ all: 'unset', cursor: 'pointer', fontSize: 10.5, fontWeight: 600, color: isResolved ? 'rgb(var(--brand-primary-dark))' : 'rgb(var(--fg-success))' }}>{isResolved ? 'Reopen' : 'Resolve'}</button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

                onKeyDown={(e) => { if (e.key === 'Enter' && draft) { setDraft(''); } }} />

            </div>
          </div>
        </Card>
      </div>
      </div>
    </div>
  );

  // Inner helper — restart song page with new track
  function onOpenAnother(id) {
    // In the live app this is wired through props; here we just nudge scrub to 0 and let
    // the floating player handle it. A full impl would lift this to the host.
    onScrub(0);
    // Bridge: signal host to swap track via SK custom event if listener present
    window.dispatchEvent(new CustomEvent('sk:open-track', { detail: { id } }));
  }
}

window.SK = window.SK || {};
Object.assign(window.SK, { MusicLibraryTab, SongPage });

<script type="text/babel" data-file="tabs/storefront.jsx">
/* global React, SK */
const { useState } = React;
const { Icon, Avatar, Card, PlayCircle } = window.SK;

/* ============================================================
   STOREFRONT — products + the public page.
   Insights live in their own tab now (sidebar > Insights).
   The page itself is a fixed template, not editable in v1.
   ============================================================ */

const fmtMoney = (n, cur = 'USD') => {
  const sym = { USD: '$', ILS: '\u20aa', EUR: '\u20ac' }[cur] || '$';
  return `${sym}${n.toLocaleString()}`;
};

const STATUS_TONE = {
  inquiry:   { label: 'Inquiry',   bg: 'rgb(var(--brand-primary) / 0.18)', fg: 'rgb(var(--brand-primary-dark))', dot: 'rgb(var(--brand-primary))' },
  hold:      { label: 'Hold',      bg: 'rgb(var(--fg-warning) / 0.18)',    fg: 'rgb(var(--fg-warning))',          dot: 'rgb(var(--fg-warning))' },
  booked:    { label: 'Booked',    bg: 'rgb(var(--fg-success) / 0.16)',    fg: 'rgb(var(--fg-success))',          dot: 'rgb(var(--fg-success))' },
  completed: { label: 'Completed', bg: 'rgb(var(--bg-elevated))',           fg: 'rgb(var(--fg-muted))',            dot: 'rgb(var(--fg-faint))' },
};

function newProductTemplate() {
  return { id: `pr${Date.now()}`, name: '', price: 100, currency: 'USD', duration: '60 min', sessions: 1, type: 'mix', visible: false, featured: false, template: 'mixing', tagline: '', includes: [], deliverables: '', depositPct: 50, revisions: 1, turnaround: '5\u20137 days' };
}

/* ============================================================
   Master container — no tabs, just sections
   ============================================================ */
function StorefrontTab() {
  const d = window.SAMPLE_DATA;
  const [published, setPublished] = useState(true);
  const [previewOpen, setPreviewOpen] = useState(false);
  const [editorProductId, setEditorProductId] = useState(null);
  const [creating, setCreating] = useState(false);
  const [products, setProducts] = useState(d.products);

  const onSaveProduct = (prod) => {
    setProducts(ps => {
      const exists = ps.find(p => p.id === prod.id);
      if (exists) return ps.map(p => p.id === prod.id ? prod : p);
      return [...ps, prod];
    });
    setEditorProductId(null);
    setCreating(false);
  };
  const onDeleteProduct = (id) => { setProducts(ps => ps.filter(p => p.id !== id)); setEditorProductId(null); };
  const onToggleVisible = (id) => setProducts(ps => ps.map(p => p.id === id ? { ...p, visible: !p.visible } : p));
  const onDuplicate = (id) => setProducts(ps => {
    const src = ps.find(p => p.id === id);
    if (!src) return ps;
    return [...ps, { ...src, id: `pr${Date.now()}`, name: `${src.name} (copy)`, visible: false, featured: false }];
  });
  const onToggleFeatured = (id) => setProducts(ps => ps.map(p => p.id === id ? { ...p, featured: !p.featured } : p));

  const editing = products.find(p => p.id === editorProductId);

  return (
    <div data-screen-label="05 Storefront" className="custom-scrollbar" style={{ flex: 1, overflowY: 'auto', padding: 'clamp(16px, 3vw, 32px)', maxWidth: 1280, margin: '0 auto', width: '100%' }}>
      <PublicLinkStrip producer={d.producer} published={published} onPublishedChange={setPublished} onPreview={() => setPreviewOpen(true)} stats={d.storefrontStats} />

      <div style={{ display: 'grid', gridTemplateColumns: 'minmax(0, 2.1fr) minmax(0, 1fr)', gap: 18, alignItems: 'start' }}>
        <section className="reveal-up stagger-2">
          <window.SK._SF.ProductsList
            products={products}
            onEdit={setEditorProductId}
            onCreate={() => setCreating(true)}
            onToggleVisible={onToggleVisible}
            onDuplicate={onDuplicate}
            onToggleFeatured={onToggleFeatured}
          />
        </section>

        <aside className="reveal-up stagger-3" style={{ position: 'sticky', top: 16, display: 'flex', flexDirection: 'column', gap: 12 }}>
          <PageSnapshot producer={d.producer} products={products} onOpen={() => setPreviewOpen(true)} />
          <PageNotice />
        </aside>
      </div>

      {previewOpen && <window.SK._SF.PublicPagePreview producer={d.producer} products={products.filter(p => p.visible)} sections={(d.pageSections || []).filter(s => s.visible)} portfolio={d.tracks.slice(0, 6)} testimonials={d.testimonials} faqs={d.faqs} socialLinks={d.socialLinks} onClose={() => setPreviewOpen(false)} />}

      {(editing || creating) && (
        <window.SK._SF.ProductEditorDrawer
          product={editing || newProductTemplate()}
          isNew={creating}
          templates={d.productTemplates}
          onClose={() => { setEditorProductId(null); setCreating(false); }}
          onSave={onSaveProduct}
          onDelete={() => editing && onDeleteProduct(editing.id)}
        />
      )}
    </div>
  );
}

/* ============================================================
   PUBLIC LINK STRIP — header
   ============================================================ */
function PublicLinkStrip({ producer, published, onPublishedChange, onPreview, stats }) {
  const [copied, setCopied] = useState(false);
  const [shareOpen, setShareOpen] = useState(false);
  const url = `skitza.app/p/${producer.slug || 'gili'}`;

  const copy = (e) => {
    e?.stopPropagation();
    if (navigator.clipboard) navigator.clipboard.writeText('https://' + url).catch(() => {});
    setCopied(true);
    setTimeout(() => setCopied(false), 1400);
  };

  return (
    <header className="reveal-up stagger-1" style={{ marginBottom: 22 }}>
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 16, marginBottom: 14, flexWrap: 'wrap' }}>
        <div>
          <span className="label-tiny" style={{ display: 'block', marginBottom: 6 }}>Public Page</span>
          <h1 className="font-syne" style={{ fontFamily: 'Syne', fontSize: 'clamp(34px, 4.5vw, 52px)', fontWeight: 800, letterSpacing: '-0.035em', margin: 0, lineHeight: 0.95 }}>Storefront</h1>
          <p style={{ margin: '8px 0 0', fontSize: 13.5, color: 'rgb(var(--fg-muted))' }}>Manage what artists can book \u2014 and the link you share.</p>
        </div>

        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <button onClick={() => onPublishedChange(!published)} className="sk-pop" title={published ? 'Page is live' : 'Page is hidden'} style={{ all: 'unset', cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: 8, padding: '8px 12px', borderRadius: 9, background: published ? 'rgb(var(--fg-success) / 0.14)' : 'rgb(var(--bg-elevated))', border: '1px solid ' + (published ? 'rgb(var(--fg-success) / 0.32)' : 'rgb(var(--border-subtle))'), color: published ? 'rgb(var(--fg-success))' : 'rgb(var(--fg-muted))', fontSize: 12, fontWeight: 700 }}>
            <span style={{ position: 'relative', width: 28, height: 16, borderRadius: 8, background: published ? 'rgb(var(--fg-success))' : 'rgb(var(--border-strong))', transition: 'background 200ms' }}>
              <span style={{ position: 'absolute', top: 2, left: published ? 14 : 2, width: 12, height: 12, borderRadius: 6, background: '#fff', transition: 'left 200ms', boxShadow: '0 1px 2px rgba(0,0,0,0.16)' }} />
            </span>
            {published ? 'Live' : 'Hidden'}
          </button>

          <button onClick={onPreview} className="sk-pop" style={{ all: 'unset', cursor: 'pointer', padding: '9px 16px', borderRadius: 9, background: 'rgb(var(--fg-default))', color: 'rgb(var(--bg-default))', fontSize: 12.5, fontWeight: 700, display: 'inline-flex', alignItems: 'center', gap: 6 }}>
            <Icon name="eye" size={13} /> Preview public page
          </button>
        </div>
      </div>

      <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 12px', borderRadius: 12, background: 'rgb(var(--bg-elevated))', border: '1px solid rgb(var(--border-subtle))', flexWrap: 'wrap' }}>
        <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, color: 'rgb(var(--fg-muted))', fontSize: 11, fontWeight: 700, letterSpacing: '0.06em', textTransform: 'uppercase' }}>
          <Icon name="link" size={12} /> Public link
        </span>
        <code style={{ flex: 1, minWidth: 180, fontFamily: 'JetBrains Mono', fontSize: 12.5, color: 'rgb(var(--fg-default))', fontWeight: 600, padding: '4px 0' }}>{url}</code>
        {stats && <span style={{ fontSize: 11, color: 'rgb(var(--fg-muted))', fontFamily: 'JetBrains Mono', borderLeft: '1px solid rgb(var(--border-subtle))', paddingLeft: 10 }}>{stats.views7d} views <span style={{ color: 'rgb(var(--fg-faint))' }}>\u00b7 7d</span></span>}
        <div style={{ display: 'flex', gap: 4 }}>
          <button onClick={copy} className="sk-pop" title="Copy link" style={{ all: 'unset', cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: 5, padding: '7px 11px', borderRadius: 8, background: copied ? 'rgb(var(--fg-success) / 0.14)' : 'rgb(var(--bg-default))', border: '1px solid ' + (copied ? 'rgb(var(--fg-success) / 0.4)' : 'rgb(var(--border-subtle))'), fontSize: 11.5, fontWeight: 700, color: copied ? 'rgb(var(--fg-success))' : 'rgb(var(--fg-default))' }}>
            <Icon name={copied ? 'check' : 'copy'} size={12} />
            {copied ? 'Copied!' : 'Copy'}
          </button>
          <div style={{ position: 'relative' }}>
            <button onClick={(e) => { e.stopPropagation(); setShareOpen(o => !o); }} className="sk-pop" title="Share" style={{ all: 'unset', cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: 5, padding: '7px 11px', borderRadius: 8, background: 'rgb(var(--bg-default))', border: '1px solid rgb(var(--border-subtle))', fontSize: 11.5, fontWeight: 700, color: 'rgb(var(--fg-default))' }}>
              <Icon name="share-2" size={12} /> Share <Icon name="chevron-down" size={11} />
            </button>
            {shareOpen && (
              <>
                <div onClick={() => setShareOpen(false)} style={{ position: 'fixed', inset: 0, zIndex: 30 }} />
                <div onClick={(e) => e.stopPropagation()} style={{ position: 'absolute', top: 'calc(100% + 6px)', right: 0, background: 'rgb(var(--bg-default))', border: '1px solid rgb(var(--border-default))', borderRadius: 10, boxShadow: '0 12px 32px rgba(17,16,9,0.18)', minWidth: 200, zIndex: 40, padding: 4, animation: 'palettePop 160ms ease-out' }}>
                  {[
                    { label: 'Copy link',          icon: 'copy',     onClick: copy },
                    { label: 'WhatsApp',           icon: 'message-circle', onClick: () => window.open(`https://wa.me/?text=${encodeURIComponent('https://' + url)}`, '_blank') },
                    { label: 'Instagram bio',      icon: 'instagram', onClick: copy },
                    { label: 'Email signature',    icon: 'mail',     onClick: copy },
                    { label: 'Embed snippet',      icon: 'code',     onClick: () => {} },
                    { label: 'Download QR code',   icon: 'qr-code',  onClick: () => {} },
                  ].map(it => (
                    <button key={it.label} onClick={() => { it.onClick(); setShareOpen(false); }} className="sk-row" style={{ all: 'unset', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 10, padding: '8px 10px', borderRadius: 7, fontSize: 12.5, fontWeight: 600, color: 'rgb(var(--fg-default))', width: 'calc(100% - 4px)' }}>
                      <Icon name={it.icon} size={13} style={{ color: 'rgb(var(--fg-muted))' }} />
                      {it.label}
                    </button>
                  ))}
                </div>
              </>
            )}
          </div>
        </div>
      </div>
    </header>
  );
}

/* ============================================================
